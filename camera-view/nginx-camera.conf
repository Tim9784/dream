# Полноэкранная фронтальная камера — HTTPS (нужен для getUserMedia)
server {
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    server_name _;
    server_tokens off;

    ssl_certificate     /opt/camera-view/certs/cert.pem;
    ssl_certificate_key /opt/camera-view/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:2m;

    root /opt/camera-view/www;
    index index.html;

    # камера в secure context
    add_header Permissions-Policy "camera=(self)" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store" always;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP → подсказка перейти на HTTPS
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    server_tokens off;
    root /opt/camera-view/www;

    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="ru"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Камера</title><body style="margin:0;background:#000;color:#eee;font:600 1.1rem system-ui;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px"><div>Открой по HTTPS:<br><a style="color:#fff" href="https://135.106.161.125:8443/">https://135.106.161.125:8443/</a><br><br><span style="font-weight:400;opacity:.75;font-size:.95rem">Браузер спросит про сертификат — нажми «Дополнительно» → перейти</span></div></body></html>';
    }
}
