<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Station Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* Stats Panel */
        #stats {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, rgba(10, 30, 60, 0.95), rgba(5, 20, 40, 0.95));
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(80, 200, 255, 0.3);
            color: #fff;
            font-size: 13px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        #stats h3 {
            font-size: 11px;
            color: rgba(100, 200, 255, 0.8);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            padding: 4px 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 14px;
            min-width: 40px;
            text-align: right;
        }

        .stat-value.positive { color: #4ade80; }
        .stat-value.negative { color: #f87171; }
        .stat-value.neutral { color: #60a5fa; }

        /* Module Panel */
        #module-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(5, 15, 30, 0.98), rgba(10, 25, 50, 0.95));
            padding: 12px 10px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(80, 180, 255, 0.3);
            z-index: 100;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #module-panel::-webkit-scrollbar { display: none; }

        .module-btn {
            flex-shrink: 0;
            width: 72px;
            height: 82px;
            background: linear-gradient(135deg, rgba(30, 60, 100, 0.6), rgba(20, 40, 70, 0.6));
            border: 2px solid rgba(80, 150, 220, 0.4);
            border-radius: 14px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .module-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
            border-radius: 12px 12px 0 0;
        }

        .module-btn.selected {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.4), rgba(0, 100, 200, 0.4));
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.4), inset 0 0 20px rgba(0, 200, 255, 0.1);
            transform: translateY(-2px);
        }

        .module-btn:active {
            transform: scale(0.95);
        }

        .module-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .module-icon svg {
            width: 26px;
            height: 26px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .module-name {
            font-size: 9px;
            font-weight: 500;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Control Buttons */
        .ctrl-group {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        #right-controls {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        #left-controls {
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(30, 60, 100, 0.8), rgba(20, 40, 70, 0.8));
            border: 2px solid rgba(80, 180, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .ctrl-btn:active {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.6), rgba(0, 100, 200, 0.6));
            transform: scale(0.92);
        }

        .ctrl-btn.danger {
            background: linear-gradient(135deg, rgba(150, 40, 40, 0.8), rgba(100, 30, 30, 0.8));
            border-color: rgba(255, 100, 100, 0.5);
        }

        .ctrl-btn.danger.active {
            background: linear-gradient(135deg, rgba(220, 60, 60, 0.9), rgba(180, 40, 40, 0.9));
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.5);
        }

        .ctrl-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 2px;
        }

        /* Hint */
        #hint {
            position: absolute;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Connection indicator */
        #connection-hint {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, rgba(0, 150, 100, 0.9), rgba(0, 100, 70, 0.9));
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 100;
            display: none;
            border: 1px solid rgba(100, 255, 200, 0.3);
        }

        #connection-hint.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Loading */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a1628, #1a2a48);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <h1>🛸 Space Station</h1>
            <div class="loader"></div>
        </div>

        <div id="stats">
            <h3>Станция</h3>
            <div class="stat-row">
                <span class="stat-label">Модули</span>
                <span class="stat-value neutral" id="stat-modules">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Энергия</span>
                <span class="stat-value" id="stat-energy">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Экипаж</span>
                <span class="stat-value neutral" id="stat-crew">0</span>
            </div>
        </div>

        <div id="connection-hint">✓ Точка стыковки</div>

        <div class="ctrl-group" id="right-controls">
            <button class="ctrl-btn" id="btn-up">▲</button>
            <button class="ctrl-btn" id="btn-left">◀</button>
            <button class="ctrl-btn" id="btn-right">▶</button>
            <button class="ctrl-btn" id="btn-down">▼</button>
        </div>

        <div class="ctrl-group" id="left-controls">
            <button class="ctrl-btn" id="btn-zoom-in">+</button>
            <button class="ctrl-btn" id="btn-zoom-out">−</button>
            <div style="height: 10px;"></div>
            <button class="ctrl-btn danger" id="btn-delete">✕</button>
        </div>

        <div id="hint">Выбери модуль и тапни на сетку</div>

        <div id="module-panel">
            <button class="module-btn selected" data-module="core">
                <div class="module-icon" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
                    <svg viewBox="0 0 24 24" fill="white"><polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/></svg>
                </div>
                <span class="module-name">Ядро</span>
            </button>

            <button class="module-btn" data-module="corridor">
                <div class="module-icon" style="background: linear-gradient(135deg, #64748b, #475569);">
                    <svg viewBox="0 0 24 24" fill="white"><rect x="2" y="8" width="20" height="8" rx="2"/></svg>
                </div>
                <span class="module-name">Коридор</span>
            </button>

            <button class="module-btn" data-module="habitat">
                <div class="module-icon" style="background: linear-gradient(135deg, #22c55e, #16a34a);">
                    <svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="10" r="2" fill="#1a1a1a"/><circle cx="16" cy="10" r="2" fill="#1a1a1a"/><circle cx="12" cy="15" r="2" fill="#1a1a1a"/></svg>
                </div>
                <span class="module-name">Жилой</span>
            </button>

            <button class="module-btn" data-module="lab">
                <div class="module-icon" style="background: linear-gradient(135deg, #e2e8f0, #94a3b8);">
                    <svg viewBox="0 0 24 24" fill="#334155"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4" fill="#60a5fa"/></svg>
                </div>
                <span class="module-name">Лаборатория</span>
            </button>

            <button class="module-btn" data-module="solar">
                <div class="module-icon" style="background: linear-gradient(135deg, #1e3a5f, #0f172a);">
                    <svg viewBox="0 0 24 24" fill="white"><rect x="1" y="10" width="9" height="4"/><rect x="14" y="10" width="9" height="4"/><rect x="10" y="8" width="4" height="8" fill="#64748b"/></svg>
                </div>
                <span class="module-name">Солн. панель</span>
            </button>

            <button class="module-btn" data-module="storage">
                <div class="module-icon" style="background: linear-gradient(135deg, #f97316, #c2410c);">
                    <svg viewBox="0 0 24 24" fill="white"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="#c2410c" stroke-width="2"/><line x1="3" y1="15" x2="21" y2="15" stroke="#c2410c" stroke-width="2"/></svg>
                </div>
                <span class="module-name">Склад</span>
            </button>

            <button class="module-btn" data-module="dock">
                <div class="module-icon" style="background: linear-gradient(135deg, #ef4444, #b91c1c);">
                    <svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="9" fill="none" stroke="white" stroke-width="3"/><circle cx="12" cy="12" r="4"/></svg>
                </div>
                <span class="module-name">Док</span>
            </button>

            <button class="module-btn" data-module="antenna">
                <div class="module-icon" style="background: linear-gradient(135deg, #9ca3af, #6b7280);">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M12 3 C8 3 5 7 5 10 L5 10 L12 14 L19 10 C19 7 16 3 12 3Z"/><rect x="11" y="14" width="2" height="7"/></svg>
                </div>
                <span class="module-name">Антенна</span>
            </button>

            <button class="module-btn" data-module="engine">
                <div class="module-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M8 4 L16 4 L18 10 L20 18 L12 22 L4 18 L6 10 Z"/><circle cx="12" cy="12" r="3" fill="#dc2626"/></svg>
                </div>
                <span class="module-name">Двигатель</span>
            </button>

            <button class="module-btn" data-module="greenhouse">
                <div class="module-icon" style="background: linear-gradient(135deg, #4ade80, #22c55e);">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2 C6 2 3 8 3 12 C3 18 7 22 12 22 C17 22 21 18 21 12 C21 8 18 2 12 2Z" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/><path d="M12 8 L12 18 M8 12 L12 8 L16 12" stroke="#166534" stroke-width="2" fill="none"/></svg>
                </div>
                <span class="module-name">Теплица</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
