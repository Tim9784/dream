<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 Trading City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
        }

        #balance-panel {
            background: linear-gradient(135deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.95));
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: #fff;
            min-width: 140px;
        }

        #balance-panel .label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        #balance-panel .value {
            font-size: 20px;
            font-weight: 700;
            color: #4ade80;
        }

        #portfolio-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Joystick */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 100;
        }

        #joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        #joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }

        /* Interaction button */
        #interact-btn {
            position: absolute;
            bottom: 50px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #interact-btn.visible {
            display: flex;
        }

        /* Location indicator */
        #location {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            display: none;
        }

        #location.visible {
            display: block;
        }

        /* News ticker */
        #news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #fbbf24;
            padding: 8px 0;
            font-size: 12px;
            overflow: hidden;
            z-index: 100;
        }

        #news-text {
            white-space: nowrap;
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Trading Modal */
        #modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 200;
            overflow-y: auto;
        }

        #modal.visible {
            display: block;
        }

        #modal-content {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }

        #modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #modal-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        #close-modal {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        /* Asset list */
        .asset-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .asset-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .asset-item:active {
            background: rgba(255,255,255,0.1);
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .asset-name {
            color: white;
            font-weight: 600;
        }

        .asset-symbol {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .asset-price {
            text-align: right;
        }

        .asset-current {
            color: white;
            font-weight: 600;
        }

        .asset-change {
            font-size: 12px;
        }

        .asset-change.up { color: #4ade80; }
        .asset-change.down { color: #f87171; }

        /* Trade panel */
        #trade-panel {
            display: none;
            background: rgba(30, 40, 60, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        #trade-panel.visible {
            display: block;
        }

        #trade-asset-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        #trade-asset-price {
            color: #4ade80;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .trade-input-group {
            margin-bottom: 15px;
        }

        .trade-label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .trade-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 18px;
        }

        .trade-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .trade-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .trade-btn.buy {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .trade-btn.sell {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        #trade-total {
            color: rgba(255,255,255,0.7);
            text-align: center;
            margin-top: 10px;
        }

        /* Portfolio */
        #portfolio-panel {
            display: none;
        }

        #portfolio-panel.visible {
            display: block;
        }

        .portfolio-total {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(22, 163, 74, 0.2));
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .portfolio-total-label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        .portfolio-total-value {
            color: #4ade80;
            font-size: 32px;
            font-weight: 700;
        }

        .holding-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .holding-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .holding-name {
            color: white;
            font-weight: 600;
        }

        .holding-value {
            color: #4ade80;
            font-weight: 600;
        }

        .holding-details {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        /* Mini chart */
        .mini-chart {
            height: 30px;
            margin-top: 8px;
        }

        /* Loading */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #loading.hidden {
            display: none;
        }

        #loading h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
        }

        #loading p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="loading">
            <h1>💰 Trading City</h1>
            <p>Добро пожаловать в мир инвестиций</p>
            <div class="loader"></div>
        </div>

        <div id="hud">
            <div id="balance-panel">
                <div class="label">Баланс</div>
                <div class="value" id="balance">$10,000</div>
            </div>
            <button id="portfolio-btn">📊 Портфель</button>
        </div>

        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>

        <button id="interact-btn">ВОЙТИ</button>

        <div id="location">📍 Фондовая биржа</div>

        <div id="news-ticker">
            <span id="news-text">📰 Добро пожаловать в Trading City! Посетите здания чтобы торговать активами.</span>
        </div>

        <!-- Trading Modal -->
        <div id="modal">
            <div id="modal-content">
                <div id="modal-header">
                    <div id="modal-title">Торговля</div>
                    <button id="close-modal">✕</button>
                </div>

                <!-- Asset Selection -->
                <div id="asset-selection">
                    <div class="tabs">
                        <button class="tab active" data-type="crypto">🪙 Крипто</button>
                        <button class="tab" data-type="stocks">📈 Акции</button>
                        <button class="tab" data-type="bonds">📄 Облигации</button>
                    </div>
                    <div class="asset-list" id="asset-list"></div>
                </div>

                <!-- Trade Panel -->
                <div id="trade-panel">
                    <button id="back-to-list" style="background:none;border:none;color:#3b82f6;margin-bottom:15px;cursor:pointer;">← Назад</button>
                    <div id="trade-asset-name">Bitcoin</div>
                    <div id="trade-asset-price">$45,000</div>
                    <canvas id="price-chart" width="460" height="100" style="width:100%;border-radius:8px;background:rgba(0,0,0,0.2);"></canvas>
                    <div class="trade-input-group" style="margin-top:15px;">
                        <div class="trade-label">Количество</div>
                        <input type="number" class="trade-input" id="trade-amount" value="1" min="0.01" step="0.01">
                    </div>
                    <div id="trade-total">Итого: $45,000</div>
                    <div class="trade-buttons">
                        <button class="trade-btn buy" id="buy-btn">КУПИТЬ</button>
                        <button class="trade-btn sell" id="sell-btn">ПРОДАТЬ</button>
                    </div>
                    <div id="holding-info" style="margin-top:15px;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;color:rgba(255,255,255,0.7);font-size:13px;"></div>
                </div>

                <!-- Portfolio Panel -->
                <div id="portfolio-panel">
                    <div class="portfolio-total">
                        <div class="portfolio-total-label">ОБЩАЯ СТОИМОСТЬ ПОРТФЕЛЯ</div>
                        <div class="portfolio-total-value" id="portfolio-value">$10,000</div>
                    </div>
                    <div id="holdings-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
