# Морской бой — публичный сайт (gunicorn + redis)
limit_req_zone $binary_remote_addr zone=panel_req:16m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=panel_conn:16m;

server {
    listen 8090 default_server;
    listen [::]:8090 default_server;
    server_name _;

    access_log /var/log/nginx/minecraft-panel.access.log;
    error_log /var/log/nginx/minecraft-panel.error.log warn;

    limit_req zone=panel_req burst=40 nodelay;
    limit_req_status 429;
    limit_conn panel_conn 40;
    limit_conn_status 429;

    client_max_body_size 32k;
    client_body_buffer_size 16k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    keepalive_requests 100;
    send_timeout 20s;
    reset_timedout_connection on;

    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 405;
    }

    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sql|bak)$ {
        return 444;
    }

    location ~ /\. {
        return 444;
    }

    location = /favicon.ico {
        return 204;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:18090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
    }
}
