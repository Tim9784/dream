# Omove — nginx: rate-limit, anti-abuse, security headers
# Общий лимит + отдельные зоны для записи API и опроса комнат
limit_req_zone $binary_remote_addr zone=panel_general:16m rate=15r/s;
limit_req_zone $binary_remote_addr zone=panel_write:16m rate=3r/s;
limit_req_zone $binary_remote_addr zone=panel_poll:16m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=panel_conn:16m;

server {
    listen 8090 default_server;
    listen [::]:8090 default_server;
    server_name _;
    server_tokens off;

    access_log /var/log/nginx/minecraft-panel.access.log;
    error_log /var/log/nginx/minecraft-panel.error.log warn;

    # базовый анти-флуд
    limit_req zone=panel_general burst=30 nodelay;
    limit_req_status 429;
    limit_req_log_level warn;
    limit_conn panel_conn 20;
    limit_conn_status 429;
    limit_conn_log_level warn;

    client_max_body_size 16k;
    client_body_buffer_size 8k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;
    client_body_timeout 8s;
    client_header_timeout 8s;
    keepalive_timeout 20s;
    keepalive_requests 50;
    send_timeout 15s;
    reset_timedout_connection on;
    sendfile on;
    tcp_nopush on;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # сканеры / шеллы / скрытые файлы
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sql|bak|ini|yml|yaml|py|sh|bash)$ {
        access_log off;
        return 444;
    }
    location ~ /\. {
        access_log off;
        return 444;
    }
    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin|adminer|\.aws|\.git) {
        access_log off;
        return 444;
    }

    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # статика напрямую (не грузит gunicorn)
    location /static/ {
        alias /opt/minecraft-panel/static/;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # создание / вход — самый строгий лимит
    location = /api/room/create {
        limit_req zone=panel_write burst=5 nodelay;
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }
    location = /api/room/join {
        limit_req zone=panel_write burst=5 nodelay;
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }

    # ходы (кавычки обязательны: {6} иначе ломает nginx)
    location ~ "^/api/room/[0-9]{6}/(action|leave)$" {
        limit_req zone=panel_write burst=10 nodelay;
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }

    # опрос состояния комнаты (poll ~1/сек)
    location ~ "^/api/room/[0-9]{6}$" {
        limit_req zone=panel_poll burst=16 nodelay;
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }

    location /api/ {
        limit_req zone=panel_write burst=8 nodelay;
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/minecraft-panel-proxy.conf;
    }
}
