<script>
(function(){
  try{
    var t=localStorage.getItem('seabattle-theme');
    if(t!=='light'&&t!=='dark'){
      t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
    }
    document.documentElement.setAttribute('data-theme', t);
  }catch(e){ document.documentElement.setAttribute('data-theme','dark'); }
  // блок pinch + double-tap zoom
  ['gesturestart','gesturechange','gestureend'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    var el = e.target;
    if(el && (el.closest && el.closest('input,textarea'))) return;
    var now = Date.now();
    if(now - lastTouchEnd <= 350) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});
  document.addEventListener('dblclick', function(e){
    var el = e.target;
    if(el && (el.closest && el.closest('input,textarea'))) return;
    e.preventDefault();
  }, {passive:false});
})();
</script>

<body>
<!-- Yandex.Metrika counter (noscript) -->

<div class="wrap">
  <div class="header-row">
    <div>
      <h1 class="brand">Игровое лобби</h1>
      <p class="tag">Нажми на игру — имя, лобби и режим.</p>
    </div>
    <button type="button" class="theme-btn" id="btnTheme">Тема</button>
  </div>

  <section id="home" class="panel">
    <h2 class="section-title">Игры</h2>
    <div class="game-grid" id="gameGrid"></div>
    <p class="hint">Нажми на карточку, чтобы начать</p>
    <div class="err" id="homeErr"></div>
  </section>

  <section id="setup" class="panel hidden">
    <div class="topbar">
      <strong id="setupTitle">Игра</strong>
      <button class="btn danger" id="btnSetupBack">Назад</button>
    </div>
    <div class="row" style="margin-top:8px">
      <label><span id="nameLabel">Твоё имя</span><input id="name" type="text" maxlength="20" value="Игрок 1" autocomplete="nickname"></label>
      <label id="name2Wrap" class="hidden"><span>Имя второго</span><input id="name2" type="text" maxlength="20" value="Игрок 2" autocomplete="nickname"></label>
    </div>

    <div id="seabattleOpts" class="hidden" style="margin-top:14px">
      <span class="field-label" style="font-size:.9rem">Размер поля</span>
      <div class="size-pick" id="sizePick">
        <button type="button" class="size-btn" data-size="small"><strong>Маленькое</strong><small>8×8 · 6 кораблей</small></button>
        <button type="button" class="size-btn active" data-size="medium"><strong>Среднее</strong><small>10×10 · 10 кораблей</small></button>
        <button type="button" class="size-btn" data-size="large"><strong>Большое</strong><small>12×12 · 12 кораблей</small></button>
      </div>
    </div>

    <div id="durakOpts" class="hidden" style="margin-top:14px">
      <span class="field-label" style="font-size:.9rem">Игроков за столом (по сети)</span>
      <div class="size-pick" id="durakPlayersPick">
        <button type="button" class="size-btn active" data-players="2"><strong>2</strong><small>Классика</small></button>
        <button type="button" class="size-btn" data-players="3"><strong>3</strong><small>Компания</small></button>
        <button type="button" class="size-btn" data-players="4"><strong>4</strong><small>Полный стол</small></button>
      </div>
    </div>

    <div class="row" style="margin-top:18px">
      <button class="btn" id="btnCreate">По сети</button>
      <button class="btn" id="btnLocal">Вдвоём здесь</button>
      <button class="btn ghost" id="btnVsAi">С роботом</button>
    </div>
    <p class="hint" id="localHint" style="text-align:left;margin-top:10px">«Вдвоём здесь» — передаёте одно устройство друг другу.</p>

    <hr style="border:0;border-top:1px solid var(--line);margin:18px 0">
    <h2 class="section-title">Есть код друга?</h2>
    <div class="row">
      <label><span>Код комнаты</span><input id="joinCode" type="text" maxlength="6" inputmode="numeric" placeholder="123456" autocomplete="off"></label>
      <button class="btn ghost" id="btnJoin" style="margin-top:22px">Войти</button>
    </div>
    <div class="err" id="setupErr"></div>
  </section>

  <section id="lobby" class="panel hidden">
    <div class="topbar">
      <strong id="lobbyGame">Игра</strong>
      <button class="btn danger" id="btnExitLobby">Выход</button>
    </div>
    <div class="hint">Код для друга</div>
    <div class="code-big" id="codeView">------</div>
    <div class="hint" id="lobbyHint">Ждём второго игрока…</div>
    <div class="lobby-players" id="lobbyPlayers" aria-live="polite"></div>
  </section>

  <section id="playing" class="hidden">
    <div class="panel">
      <div class="topbar">
        <strong id="playTitle">Игра</strong>
        <button class="btn danger" id="btnExitPlay">Выход</button>
      </div>
      <div class="status" id="playStatus">…</div>
      <div class="game-stage">
        <div class="win-chance hidden" id="winChance" title="Шанс победы">
          <span id="winChancePct">—</span>
        </div>
        <div id="gameMount"></div>
      </div>
      <div class="err" id="playErr"></div>
    </div>
  </section>

  <section id="done" class="panel hidden">
    <div class="status" id="doneStatus">Игра окончена</div>
    <div class="row" style="justify-content:center;margin-top:14px">
      <button class="btn" id="btnReplay">Играть заново</button>
      <button class="btn ghost" id="btnAgain">В меню</button>
    </div>
  </section>
</div>
<script src="/static/app.js?v=20260716u"></script>
</body>
</html>
